<!DOCTYPE html>
<html>
<head>
<title>Event Registration</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="register"></body>

<h1>Event Registration</h1>

<body>


<form action="/register" method="POST">

<input type="text" name="name" placeholder="Enter Your Name" required><br><br>

<input type="email" name="email" placeholder="Enter Your Email" required><br><br>

<input type="text" name="vtu" placeholder="Enter VTU Number" required><br><br>

<input type="text" name="dept" placeholder="Enter Department" required><br><br>

<input type="text" id="eventName" name="event" readonly><br><br>

<button type="submit">Register</button>

</form>


<script>

const params = new URLSearchParams(window.location.search);

document.getElementById("eventName").value = params.get("event");

</script>

</body>
</html>
